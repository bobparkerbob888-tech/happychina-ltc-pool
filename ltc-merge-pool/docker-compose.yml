version: "3.7"

services:
  pool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: happychina-pool
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3080:8090"    # Web frontend + API
      - "3332:3332"    # Stratum: ASIC Fixed 1M
      - "3333:3333"    # Stratum: ASIC Vardiff 1M
      - "3334:3334"    # Stratum: Mega Fixed 2B
      - "3335:3335"    # Stratum: Mega Vardiff 500M
    volumes:
      - ${APP_DATA_DIR}/config.toml:/etc/happychain-pool/config.toml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pool-net
    environment:
      - RUST_LOG=info

  postgres:
    image: postgres:16-bookworm
    container_name: happychina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pool
      POSTGRES_PASSWORD: pool
      POSTGRES_DB: happychain
    volumes:
      - ${APP_DATA_DIR}/pgdata:/var/lib/postgresql/data
    networks:
      - pool-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pool -d happychain"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.25-bookworm
    container_name: happychina-nginx
    restart: unless-stopped
    depends_on:
      - pool
    ports:
      - "3081:80"
    volumes:
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pool-net

networks:
  pool-net:
    driver: bridge
