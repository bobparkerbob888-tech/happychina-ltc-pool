category: finance
version: "1.0.0"
port: 3080
description: >-
  A high-performance Litecoin merge mining pool written in Rust. Mines Litecoin (LTC) as the
  parent chain using scrypt proof-of-work, and simultaneously merge-mines 8 auxiliary chains:
  Dogecoin (DOGE), Pepecoin (PEPE), Bellscoin (BELLS), Luckycoin (LKY), Junkcoin (JKC),
  Dingocoin (DINGO), Shibacoin (SHIC), and TrumpPoW (TRMP).


  Features include PPLNS payout scheme, automatic withdrawal processing, variable difficulty
  (vardiff) support for ASICs, real-time web dashboard with block tracking, merge-mined coin
  stats, miner/worker monitoring, and a PostgreSQL-backed database for reliability.


  The pool binary is compiled from Rust source code during installation. Stratum ports are
  exposed for connecting ASIC miners. The web frontend provides a real-time overview of pool
  hashrate, found blocks across all 9 coins, miner statistics, and withdrawal management.


  Requirements: All 9 coin daemons (litecoind, dogecoind, pepecoind, bellsd, luckycoind,
  junkcoind, dingocoind, shibacoind, trumpowd) must be running and accessible via RPC.
  Configure their RPC URLs in the config.toml file before starting the pool.
