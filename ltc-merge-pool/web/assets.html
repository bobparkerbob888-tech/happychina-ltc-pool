<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets - HappyChina Pool</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <div class="logo-icon">HC</div>
            HappyChina Pool
        </a>
        <div class="navbar-links">
            <a href="/">Dashboard</a>
            <a href="blocks.html">Blocks</a>
            <a href="miner.html">Miner</a>
        </div>
    </nav>

    <div class="container">
        <div id="assets-content">
            <div class="page-title">
                Assets &mdash; <span id="assets-addr" class="mono" style="font-size:0.85rem;word-break:break-all"></span>
            </div>

            <div class="section">
                <div class="section-title">Coin Balances</div>
                <div class="table-wrap">
                    <table class="assets-table">
                        <thead>
                            <tr>
                                <th>Coin</th>
                                <th>Balance</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="assets-body">
                            <tr><td colspan="3" class="loading"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-title">Withdraw <span id="withdraw-coin"></span></div>
            <div class="modal-balance">Available: <span id="withdraw-balance">0</span></div>
            <div class="modal-field">
                <label>Amount</label>
                <div class="input-group">
                    <input type="number" id="withdraw-amount" placeholder="0.00000000" step="any" min="0">
                    <button class="btn btn-outline btn-sm" onclick="setMaxWithdraw()">MAX</button>
                </div>
            </div>
            <input type="hidden" id="withdraw-addr">
            <input type="hidden" id="withdraw-coin-hidden">
            <input type="hidden" id="withdraw-max">
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitWithdrawal()">Confirm Withdrawal</button>
            </div>
        </div>
    </div>

    <div class="footer">
        HappyChina Pool &mdash; No registration needed. Mine to your address, withdraw anytime.
    </div>

    <script src="js/app.js"></script>
    <script>startAutoRefresh(loadAssetsPage, 30000);</script>
</body>
</html>
